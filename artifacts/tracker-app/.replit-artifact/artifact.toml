kind = "web"
previewPath = "/"
title = "Tracker"
version = "1.0.0"
id = "artifacts/tracker-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21472

[services.development]
run = "pnpm --filter @workspace/tracker-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tracker-app", "run", "build" ]
publicDir = "artifacts/tracker-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21472"
BASE_PATH = "/"
